function openModal(html){let overlay=document.getElementById('modal-overlay');if(!overlay){overlay=document.createElement('div');overlay.id='modal-overlay';overlay.className='modal-overlay';document.body.appendChild(overlay);}overlay.innerHTML=html;overlay.classList.add('open');overlay.onclick=(e)=>{if(e.target===overlay)closeModal();};}
function closeModal(){const overlay=document.getElementById('modal-overlay');if(overlay)overlay.classList.remove('open');}

async function openBoneModal(customerId){const{data:temples}=await sb.from('temples').select('id,name').order('name');const tOpts=(temples||[]).map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('');openModal(`<div class="modal"><div class="modal-header"><div class="modal-title">茫聛聤茅聛潞茅陋篓莽聶禄茅聦虏</div><button class="modal-close" onclick="closeModal()">脙聴</button></div><div class="modal-body"><div class="form-grid"><div class="field form-full"><label>茫聛聤氓聬聧氓聣聧 *</label><input id="b-name" placeholder="忙聲聟 氓卤卤莽聰掳 猫聤卤氓颅聬"></div><div class="field"><label>忙聙搂氓聢楼</label><select id="b-gender"><option value="">忙聹陋茅聛赂忙聤聻</option><option>莽聰路忙聙搂</option><option>氓楼鲁忙聙搂</option></select></div><div class="field"><label>盲潞芦氓鹿麓</label><input id="b-age" type="number" placeholder="80"></div><div class="field"><label>盲驴聺莽庐隆氓炉潞茅聶垄</label><select id="b-temple"><option value="">忙聹陋茅聛赂忙聤聻</option>${tOpts}</select></div><div class="field"><label>莽麓聧茅陋篓忙聴楼</label><input id="b-entomb" type="date"></div><div class="field form-full"><label>QR茫聜鲁茫聝录茫聝聣 URL</label><input id="b-qr" placeholder="https://..."></div><div class="field form-full"><label>氓聜聶猫聙聝</label><textarea id="b-notes"></textarea></div></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">茫聜颅茫聝拢茫聝鲁茫聜禄茫聝芦</button><button class="btn btn-gold" onclick="saveBone('${customerId}')">盲驴聺氓颅聵</button></div></div>`);}
async function saveBone(customerId){const name=document.getElementById('b-name').value.trim();if(!name){toast('茫聛聤氓聬聧氓聣聧茫聛炉氓驴聟茅聽聢茫聛搂茫聛聶','error');return;}const{error}=await sb.from('bones').insert({customer_id:customerId,name,gender:document.getElementById('b-gender').value||null,age_at_death:parseInt(document.getElementById('b-age').value)||null,storage_temple_id:document.getElementById('b-temple').value||null,entombment_date:document.getElementById('b-entomb').value||null,qr_code:document.getElementById('b-qr').value.trim()||null,notes:document.getElementById('b-notes').value.trim()||null});if(error){toast('盲驴聺氓颅聵茫聜篓茫聝漏茫聝录: '+error.message,'error');return;}toast('盲驴聺氓颅聵茫聛聴茫聛戮茫聛聴茫聛聼','success');closeModal();showPage('customer-detail',customerId);}
async function deleteBone(boneId,customerId,boneName){showConfirm('茫聛聤茅聛潞茅陋篓茫聝聡茫聝录茫聜驴茫聛庐氓聣聤茅聶陇',`茫聙聦${boneName||'茫聛聤茅聛潞茅陋篓'}茫聙聧茫聛庐茫聝聡茫聝录茫聜驴茫聜聮氓聣聤茅聶陇茫聛聴茫聛戮茫聛聶茫聛聥茂录聼`,'茅聳垄茅聙拢茫聛聶茫聜聥茅聙聛茅陋篓猫篓聵茅聦虏茫聜聜氓聣聤茅聶陇茫聛聲茫聜聦茫聛戮茫聛聶茫聙聜',async()=>{await sb.from('bones').delete().eq('id',boneId);toast('氓聣聤茅聶陇茫聛聴茫聛戮茫聛聴茫聛聼');showPage('customer-detail',customerId);});}
function openDeliveryModal(boneId,customerId){openModal(`<div class="modal" style="max-width:440px;"><div class="modal-header"><div class="modal-title">茅聙聛茅陋篓猫篓聵茅聦虏</div><button class="modal-close" onclick="closeModal()">脙聴</button></div><div class="modal-body"><div class="form-grid"><div class="field"><label>茅聙聛茅陋篓忙聴楼</label><input id="d-date" type="date" value="${new Date().toISOString().split('T')[0]}"></div><div class="field"><label>忙鲁聲猫娄聛</label><select id="d-ceremony"><option value="false">茫聛陋茫聛聴</option><option value="true">茫聛聜茫聜聤</option></select></div><div class="field form-full"><label>忙聥聟氓陆聯猫聙聟</label><input id="d-staff" placeholder="忙聥聟氓陆聯猫聙聟氓聬聧"></div><div class="field form-full"><label>氓聜聶猫聙聝</label><textarea id="d-notes"></textarea></div></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">茫聜颅茫聝拢茫聝鲁茫聜禄茫聝芦</button><button class="btn btn-gold" onclick="saveDelivery('${boneId}','${customerId}')">盲驴聺氓颅聵</button></div></div>`);}
async function saveDelivery(boneId,customerId){const{error}=await sb.from('deliveries').insert({bone_id:boneId,customer_id:customerId,delivery_date:document.getElementById('d-date').value||null,has_ceremony:document.getElementById('d-ceremony').value==='true',staff_name:document.getElementById('d-staff').value.trim()||null,notes:document.getElementById('d-notes').value.trim()||null});if(error){toast('盲驴聺氓颅聵茫聜篓茫聝漏茫聝录: '+error.message,'error');return;}toast('盲驴聺氓颅聵茫聛聴茫聛戮茫聛聴茫聛聼','success');closeModal();showPage('customer-detail',customerId);}
function openTempleModal(){openModal(`<div class="modal" style="max-width:500px;"><div class="modal-header"><div class="modal-title">氓炉潞茅聶垄莽聶禄茅聦虏</div><button class="modal-close" onclick="closeModal()">脙聴</button></div><div class="modal-body"><div class="form-grid"><div class="field form-full"><label>氓炉潞茅聶垄氓聬聧 *</label><input id="t-name" placeholder="茫聙聡茫聙聡氓炉潞"></div><div class="field"><label>茫聜篓茫聝陋茫聜垄</label><input id="t-area" placeholder="忙聺卤盲潞卢茅聝陆忙赂聥猫掳路氓聦潞"></div><div class="field"><label>氓庐聴忙麓戮</label><input id="t-sect" placeholder="忙碌聞氓聹聼氓庐聴"></div><div class="field"><label>氓楼聭莽麓聞茅聡聭茂录聢氓聠聠茂录聣</label><input id="t-amount" type="number" value="90000"></div><div class="field form-full"><label>盲陆聫忙聣聙</label><input id="t-address" placeholder="忙聺卤盲潞卢茅聝陆..."></div><div class="field form-full"><label>茅聙拢莽碌隆氓聟聢</label><input id="t-contact" placeholder="03-0000-0000"></div></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">茫聜颅茫聝拢茫聝鲁茫聜禄茫聝芦</button><button class="btn btn-gold" onclick="saveTemple()">盲驴聺氓颅聵</button></div></div>`);}
async function saveTemple(){const name=document.getElementById('t-name').value.trim();if(!name){toast('氓炉潞茅聶垄氓聬聧茫聛炉氓驴聟茅聽聢茫聛搂茫聛聶','error');return;}const{error}=await sb.from('temples').insert({name,area:document.getElementById('t-area').value.trim()||null,sect:document.getElementById('t-sect').value.trim()||null,contract_amount:parseInt(document.getElementById('t-amount').value)||90000,address:document.getElementById('t-address').value.trim()||null,contact:document.getElementById('t-contact').value.trim()||null});if(error){toast('盲驴聺氓颅聵茫聜篓茫聝漏茫聝录: '+error.message,'error');return;}toast('盲驴聺氓颅聵茫聛聴茫聛戮茫聛聴茫聛聼','success');closeModal();pages.temples();}
async function deleteTemple(id,templeName){showConfirm('氓炉潞茅聶垄茫聛庐氓聣聤茅聶陇',`茫聙聦${templeName||'氓炉潞茅聶垄'}茫聙聧茫聜聮氓聣聤茅聶陇茫聛聴茫聛戮茫聛聶茫聛聥茂录聼`,'茅隆搂氓庐垄茫聛庐氓楼聭莽麓聞氓炉潞茅聶垄茫聛篓茫聛聴茫聛娄猫篓颅氓庐職茫聛聲茫聜聦茫聛娄茫聛聞茫聜聥氓聽麓氓聬聢茫聙聛茫聛聺茫聛庐氓聫聜莽聟搂茫聛聦氓陇聳茫聜聦茫聛戮茫聛聶茫聙聜',async()=>{await sb.from('temples').delete().eq('id',id);toast('氓聣聤茅聶陇茫聛聴茫聛戮茫聛聴茫聛聼');pages.temples();});}
(async()=>{const config=getSavedConfig();if(!config){document.getElementById('auth-screen').style.display='none';document.getElementById('setup-screen').style.display='block';return;}initSupabase(config.url,config.key);const{data:{session}}=await sb.auth.getSession();if(session?.user){await startApp(session.user);}sb.auth.onAuthStateChange(async(event,session)=>{if(event==='SIGNED_IN'&&session?.user&&!currentUser){await startApp(session.user);}});})();
</script>
