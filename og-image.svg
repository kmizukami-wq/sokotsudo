    <rect x="266" y="122" width="14" height="14" rx="2" fill="#c9a227"/>
    <rect x="109" y="168" width="13" height="34" rx="3" fill="#c9a227"/>
    <rect x="84" y="190" width="36" height="11" rx="3" fill="#c9a227"/>
