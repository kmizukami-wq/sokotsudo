  <text x="120" y="490" font-family="serif" font-size="64" font-weight="bold" fill="white" letter-spacing="4">送骨堂</text>
  <text x="120" y="555" font-family="serif" font-size="32" fill="#c9a227" letter-spacing="2">— 招く供養</text>
